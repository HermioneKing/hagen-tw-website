services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hagen
      POSTGRES_PASSWORD: hagen
      POSTGRES_DB: hagen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hagen -d hagen']
      interval: 5s
      timeout: 5s
      retries: 10

  schema-push:
    build:
      context: .
      target: sync
    env_file:
      - .env
    environment:
      DATABASE_URI: postgresql://hagen:hagen@db:5432/hagen
      DATABASE_PUSH: 'true'
    depends_on:
      db:
        condition: service_healthy
    command: npm run push:schema
    restart: 'no'

  content-import:
    build:
      context: .
      target: sync
    env_file:
      - .env
    environment:
      DATABASE_URI: postgresql://hagen:hagen@db:5432/hagen
      DATABASE_PUSH: 'false'
    volumes:
      - ./content:/app/content
      - ./content/media:/app/media
    depends_on:
      db:
        condition: service_healthy
      schema-push:
        condition: service_completed_successfully
    command: npm run content:import
    restart: 'no'

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      schema-push:
        condition: service_completed_successfully
      content-import:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URI: postgresql://hagen:hagen@db:5432/hagen
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      DATABASE_PUSH: 'true'
      NODE_ENV: development
    volumes:
      - ./content/media:/app/media

volumes:
  postgres_data:
