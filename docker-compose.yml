services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hagen
      POSTGRES_PASSWORD: hagen
      POSTGRES_DB: hagen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hagen -d hagen']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URI: postgresql://hagen:hagen@db:5432/hagen
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000

volumes:
  postgres_data:
